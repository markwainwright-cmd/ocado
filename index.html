Brittain Ladd", "target": "Peter Michael Gialantzis", "weight": 2}, {"source": "Anthony P.", "target": "Peter Michael Gialantzis", "weight": 1}, {"source": "Jeff Strasser", "target": "\ud83c\udff7 Ricardo Belmar", "weight": 2}, {"source": "Greg Buzek", "target": "Sue McMahon", "weight": 1}, {"source": "Keith Mercier", "target": "\ud83c\udff7 Ricardo Belmar", "weight": 1}, {"source": "Jeff Strasser", "target": "Keith Mercier", "weight": 1}, {"source": "Barney \ud83c\udf1e Stacher", "target": "Trevor Sumner", "weight": 1}, {"source": "Haughey, Stephanie", "target": "Jeff Smith", "weight": 1}, {"source": "Branislav Pulis", "target": "Jan Zizka", "weight": 1}, {"source": "Jeff Strasser", "target": "Sue McMahon", "weight": 1}, {"source": "Sue McMahon", "target": "\ud83c\udff7 Ricardo Belmar", "weight": 1}, {"source": "Marianna Burchfield", "target": "Peter Michael Gialantzis", "weight": 3}, {"source": "Cathy Hotka", "target": "\ud83c\udff7 Ricardo Belmar", "weight": 1}, {"source": "RTMNexus", "target": "\ud83c\udff7 Ricardo Belmar", "weight": 1}, {"source": "Incisiv", "target": "Jeremy Baksht", "weight": 1}, {"source": "Incisiv", "target": "Tim Shea", "weight": 1}, {"source": "David Weinand", "target": "Incisiv", "weight": 1}, {"source": "Haughey, Stephanie", "target": "Taylor Walker", "weight": 1}, {"source": "Ben Angel", "target": "Brittain Ladd", "weight": 5}, {"source": "Brittain Ladd", "target": "Neil Saunders", "weight": 10}, {"source": "Brittain Ladd", "target": "Jeremy Baksht", "weight": 1}, {"source": "Alex Harvey", "target": "Ben Angel", "weight": 2}, {"source": "Isabella Fish", "target": "Richard Fletcher", "weight": 1}, {"source": "Lukas M. Ziegler", "target": "Tom Andersson", "weight": 2}];

const CATS = {
  'Ocado':            { color: '#4caf50', order: 0 },
  'Ocado Alumni':     { color: '#26a69a', order: 1 },
  'Media & Journalist': { color: '#ef5350', order: 2 },
  'Industry Voice':   { color: '#64b5f6', order: 3 },
  'Sector Exec':      { color: '#ffa726', order: 4 },
  'Corporate Leader': { color: '#ce93d8', order: 5 },
  'Ocado Ecosystem':  { color: '#66bb6a', order: 6 },
  'Retail & Tech Commentator': { color: '#e8b74a', order: 7 },
  'Wider Community': { color: '#b07cc6', order: 8 }
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#network')
  .attr('width', width)
  .attr('height', height);

// Defs for glow
const defs = svg.append('defs');
const glow = defs.append('filter').attr('id', 'glow');
glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
const merge = glow.append('feMerge');
merge.append('feMergeNode').attr('in', 'blur');
merge.append('feMergeNode').attr('in', 'SourceGraphic');

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

// Prepare data
const nodeMap = new Map();
rawNodes.forEach(n => {
  n.connections = 0;
  nodeMap.set(n.id, n);
});

const edges = rawEdges.filter(e => nodeMap.has(e.source) && nodeMap.has(e.target));
edges.forEach(e => {
  nodeMap.get(e.source).connections += e.weight;
  nodeMap.get(e.target).connections += e.weight;
});

const nodes = rawNodes.filter(n => nodeMap.has(n.id));

// Scales
const radiusScale = d3.scaleSqrt()
  .domain([0, d3.max(nodes, d => d.connections)])
  .range([4, 32]);

const edgeWidthScale = d3.scaleSqrt()
  .domain([1, d3.max(edges, d => d.weight)])
  .range([0.5, 5]);

const edgeOpacityScale = d3.scaleLinear()
  .domain([1, d3.max(edges, d => d.weight)])
  .range([0.08, 0.45]);

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d => d.id).distance(d => 120 / Math.sqrt(d.weight)).strength(d => Math.min(0.5, d.weight * 0.03)))
  .force('charge', d3.forceManyBody().strength(d => d.isKeyInfluencer ? -300 : -120))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide(d => radiusScale(d.connections) + 4))
  .force('x', d3.forceX(width / 2).strength(0.03))
  .force('y', d3.forceY(height / 2).strength(0.03));

// Links
const linkGroup = g.append('g');
const link = linkGroup.selectAll('line')
  .data(edges)
  .join('line')
  .attr('stroke', '#ffffff')
  .attr('stroke-opacity', d => edgeOpacityScale(d.weight))
  .attr('stroke-width', d => edgeWidthScale(d.weight));

// Node groups
const nodeGroup = g.append('g');
const node = nodeGroup.selectAll('g')
  .data(nodes)
  .join('g')
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', dragStarted)
    .on('drag', dragged)
    .on('end', dragEnded));

// Node circles
node.append('circle')
  .attr('r', d => radiusScale(d.connections))
  .attr('fill', d => (CATS[d.category] || CATS['Wider Community']).color)
  .attr('fill-opacity', d => d.isKeyInfluencer ? 0.85 : 0.5)
  .attr('stroke', d => (CATS[d.category] || CATS['Wider Community']).color)
  .attr('stroke-width', d => d.isKeyInfluencer ? 2 : 0.5)
  .attr('stroke-opacity', d => d.isKeyInfluencer ? 0.6 : 0.2)
  .attr('filter', d => d.isKeyInfluencer && d.connections > 20 ? 'url(#glow)' : null);

// Labels (only for key influencers or high-connection nodes)
const labels = node.append('text')
  .text(d => {
    let name = d.id;
    if (name.startsWith('🏷')) name = name.replace('🏷 ', '');
    if (name.includes('🪩')) name = name.replace(' 🪩', '');
    return name;
  })
  .attr('x', d => radiusScale(d.connections) + 4)
  .attr('y', 3)
  .attr('font-size', d => d.isKeyInfluencer ? '10.5px' : '9px')
  .attr('font-weight', d => d.isKeyInfluencer ? '500' : '300')
  .attr('fill', d => d.isKeyInfluencer ? '#c8cdd8' : '#6b7385')
  .attr('opacity', d => (d.isKeyInfluencer || d.connections >= 15) ? 1 : 0)
  .attr('class', 'node-label');

let showLabels = true;

// Tooltip
const tooltip = document.getElementById('tooltip');

node.on('mouseover', function(event, d) {
  const catInfo = CATS[d.category] || CATS['Wider Community'];
  tooltip.innerHTML = `
    <div class="cat-badge" style="background:${catInfo.color}22;color:${catInfo.color}">${d.category}</div>
    <div class="name">${d.id}</div>
    <div class="occ">${d.occupation || 'No occupation listed'}</div>
    <div class="stat"><span>Comment interactions</span><strong>${d.connections}</strong></div>
    <div class="stat"><span>Posts in dataset</span><strong>${d.posts}</strong></div>
    ${d.totalLikes ? `<div class="stat"><span>Total likes</span><strong>${d.totalLikes.toLocaleString()}</strong></div>` : ''}
    ${d.followers ? `<div class="stat"><span>Followers</span><strong>${d.followers}</strong></div>` : ''}
  `;
  tooltip.classList.add('visible');
  tooltip.style.left = (event.pageX + 16) + 'px';
  tooltip.style.top = (event.pageY - 10) + 'px';

  // Highlight connected
  const connected = new Set();
  edges.forEach(e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    if (src === d.id) connected.add(tgt);
    if (tgt === d.id) connected.add(src);
  });
  connected.add(d.id);

  node.select('circle')
    .attr('fill-opacity', n => connected.has(n.id) ? 0.9 : 0.08)
    .attr('stroke-opacity', n => connected.has(n.id) ? 0.8 : 0.05);
  labels.attr('opacity', n => {
    if (!showLabels) return connected.has(n.id) ? 1 : 0;
    return connected.has(n.id) ? 1 : 0.1;
  });
  link
    .attr('stroke-opacity', e => {
      const src = typeof e.source === 'object' ? e.source.id : e.source;
      const tgt = typeof e.target === 'object' ? e.target.id : e.target;
      return (src === d.id || tgt === d.id) ? 0.6 : 0.02;
    })
    .attr('stroke', e => {
      const src = typeof e.source === 'object' ? e.source.id : e.source;
      const tgt = typeof e.target === 'object' ? e.target.id : e.target;
      return (src === d.id || tgt === d.id) ? catInfo.color : '#ffffff';
    });
})
.on('mousemove', function(event) {
  tooltip.style.left = (event.pageX + 16) + 'px';
  tooltip.style.top = (event.pageY - 10) + 'px';
})
.on('mouseout', function() {
  tooltip.classList.remove('visible');
  resetHighlight();
})
.on('click', function(event, d) {
  if (d.url) window.open(d.url, '_blank');
});

function resetHighlight() {
  node.select('circle')
    .attr('fill-opacity', d => d.isKeyInfluencer ? 0.85 : 0.5)
    .attr('stroke-opacity', d => d.isKeyInfluencer ? 0.6 : 0.2);
  labels.attr('opacity', d => {
    if (!showLabels) return 0;
    return (d.isKeyInfluencer || d.connections >= 15) ? 1 : 0;
  });
  link
    .attr('stroke-opacity', d => edgeOpacityScale(d.weight))
    .attr('stroke', '#ffffff');
}

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Legend
const legendEl = document.getElementById('legend');
const usedCats = [...new Set(nodes.map(n => n.category))].sort((a,b) => (CATS[a]||CATS['Wider Community']).order - (CATS[b]||CATS['Wider Community']).order);
legendEl.innerHTML = '<h3>Node Categories</h3>' + usedCats.map(cat => {
  const c = (CATS[cat] || CATS['Wider Community']).color;
  return `<div class="legend-item" data-cat="${cat}"><div class="legend-dot" style="background:${c}"></div>${cat}</div>`;
}).join('');

// Legend filtering
let activeCats = new Set(usedCats);
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    const cat = el.dataset.cat;
    if (activeCats.has(cat)) {
      activeCats.delete(cat);
      el.classList.add('dimmed');
    } else {
      activeCats.add(cat);
      el.classList.remove('dimmed');
    }
    node.attr('display', d => activeCats.has(d.category) ? null : 'none');
    link.attr('display', e => {
      const src = typeof e.source === 'object' ? e.source : nodeMap.get(e.source);
      const tgt = typeof e.target === 'object' ? e.target : nodeMap.get(e.target);
      return (activeCats.has(src.category) && activeCats.has(tgt.category)) ? null : 'none';
    });
  });
});

// Controls
document.getElementById('btnReset').addEventListener('click', () => {
  svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
  activeCats = new Set(usedCats);
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('dimmed'));
  node.attr('display', null);
  link.attr('display', null);
});

document.getElementById('btnLabels').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active');
  labels.attr('opacity', d => {
    if (!showLabels) return 0;
    return (d.isKeyInfluencer || d.connections >= 15) ? 1 : 0;
  });
});

let tight = false;
document.getElementById('btnStrength').addEventListener('click', function() {
  tight = !tight;
  this.classList.toggle('active');
  simulation
    .force('charge', d3.forceManyBody().strength(d => d.isKeyInfluencer ? (tight ? -150 : -300) : (tight ? -60 : -120)))
    .alpha(0.5).restart();
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { resetHighlight(); return; }
  const matches = new Set();
  nodes.forEach(n => {
    if (n.id.toLowerCase().includes(q) || (n.occupation||'').toLowerCase().includes(q)) matches.add(n.id);
  });
  node.select('circle')
    .attr('fill-opacity', d => matches.has(d.id) ? 0.95 : 0.08)
    .attr('stroke-opacity', d => matches.has(d.id) ? 0.8 : 0.05);
  labels.attr('opacity', d => matches.has(d.id) ? 1 : 0.05);
  link.attr('stroke-opacity', 0.02);
});

// Initial zoom to fit
setTimeout(() => {
  const bounds = g.node().getBBox();
  const fullWidth = bounds.width;
  const fullHeight = bounds.height;
  const midX = bounds.x + fullWidth / 2;
  const midY = bounds.y + fullHeight / 2;
  const scale = 0.85 / Math.max(fullWidth / width, fullHeight / height);
  const translate = [width / 2 - scale * midX, height / 2 - scale * midY];
  svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
}, 3000);
</script>
